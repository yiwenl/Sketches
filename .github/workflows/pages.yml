# Publishes the Next.js hub static export to GitHub Pages.
# One-time: Repository Settings → Pages → Build and deployment → Source → GitHub Actions.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: hub/package-lock.json

      - name: Install and build hub
        working-directory: hub
        run: npm ci && npm run build

      # Pages must serve the Next export plus committed experiment builds under experiments/ and experiments2/.
      - name: Stage site for upload
        run: |
          mkdir -p _site
          cp -R hub/out/. _site/
          cp -R experiments _site/
          cp -R experiments2 _site/
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
